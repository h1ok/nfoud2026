services:
  - type: web
    name: nfoud
    runtime: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/Mrsos07/nfoud.git
    branch: master
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: PORT
        value: "10000"
    healthCheckPath: /
    numInstances: 1
    plan: free
